<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Analyzer | CyberSec Lab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#030712;--bg1:#080f1e;--bg2:#0d1526;--cyan:#00f0ff;--purple:#bd00ff;--green:#00ff88;--red:#ff2244;--orange:#ff8c00;--yellow:#ffcc00;--t0:#fff;--t1:#b8cce0;--t2:#5a7a96;--border:rgba(0,240,255,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding:24px 16px}
.container{max-width:1000px;margin:0 auto}
.title{font-size:24px;font-weight:700;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.title::before{content:'◈';color:var(--cyan)}
.soc-note{background:rgba(0,240,255,.05);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:6px;padding:12px 16px;font-size:13px;color:var(--t2);margin-bottom:24px;font-family:'JetBrains Mono',monospace}
.soc-note strong{color:var(--cyan)}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--t0);font-family:'JetBrains Mono',monospace;font-size:12px;padding:14px;resize:vertical;min-height:160px;outline:none;transition:border-color .2s;margin-bottom:12px;line-height:1.7}
textarea:focus{border-color:var(--cyan)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.btn{border:none;border-radius:8px;padding:10px 22px;font-size:14px;cursor:pointer;font-weight:700;font-family:'Rajdhani',sans-serif;background:var(--cyan);color:#000;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-sm{background:var(--bg2);color:var(--t2);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.btn-sm:hover{color:var(--cyan);border-color:var(--cyan)}
.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ex-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:'JetBrains Mono',monospace}
.ex-btn:hover{color:var(--cyan);border-color:var(--cyan)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.alert-box{background:rgba(255,34,68,.06);border:1px solid rgba(255,34,68,.2);border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-box.warn{background:rgba(255,204,0,.06);border-color:rgba(255,204,0,.2)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:700;color:var(--red)}
.alert-box.warn .alert-title{color:var(--yellow)}
.alert-desc{font-size:12px;color:var(--t2);margin-top:3px}
.ip-table{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:16px}
.ip-head{display:grid;grid-template-columns:1fr 100px 100px;padding:10px 16px;background:var(--bg2);font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.ip-row{display:grid;grid-template-columns:1fr 100px 100px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-family:'JetBrains Mono',monospace;font-size:12px;align-items:center}
.ip-row:last-child{border-bottom:none}
.risk-high{color:var(--red);font-weight:700}
.risk-med{color:var(--orange)}
.risk-low{color:var(--green)}
.section-label{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}
</style>
</head>
<body>
<div class="container">
  <div class="title">LOG ANALYZER</div>
  <div class="soc-note">
    <strong>SOC Analist Notu:</strong> Web server, SSH veya firewall loglarini yapistir — brute-force denemeleri, sik tekrar eden IP'ler ve supeheli pattern'ler otomatik tespit edilir. Apache/Nginx access log, auth.log, ve genel formatlari destekler.
  </div>

  <div class="card">
    <div class="examples">
      <span style="font-size:11px;color:var(--t2);align-self:center">Ornek:</span>
      <button class="ex-btn" onclick="loadExample('ssh')">SSH Brute Force</button>
      <button class="ex-btn" onclick="loadExample('web')">Web Access Log</button>
      <button class="ex-btn" onclick="loadExample('mixed')">Karisik Saldiri</button>
    </div>
    <textarea id="log-input" placeholder="Log verisini buraya yapistir (Apache, Nginx, SSH auth.log vb.)..."></textarea>
    <div class="btn-row">
      <button class="btn" onclick="analyzeLog()">Logu Analiz Et</button>
      <button class="btn-sm" onclick="document.getElementById('log-input').value='';document.getElementById('results').innerHTML=''">Temizle</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const examples = {
ssh:`Jun 29 10:15:01 server sshd[1234]: Failed password for root from 203.0.113.42 port 51234 ssh2
Jun 29 10:15:03 server sshd[1234]: Failed password for root from 203.0.113.42 port 51235 ssh2
Jun 29 10:15:05 server sshd[1234]: Failed password for admin from 203.0.113.42 port 51236 ssh2
Jun 29 10:15:08 server sshd[1234]: Failed password for root from 203.0.113.42 port 51237 ssh2
Jun 29 10:15:10 server sshd[1234]: Failed password for test from 198.51.100.7 port 33421 ssh2
Jun 29 10:16:00 server sshd[1234]: Accepted password for ismail from 192.168.1.50 port 41234 ssh2
Jun 29 10:18:45 server sshd[1234]: Failed password for root from 203.0.113.42 port 51240 ssh2
Jun 29 10:18:47 server sshd[1234]: Failed password for root from 203.0.113.42 port 51241 ssh2`,
web:`192.168.1.105 - - [29/Jun/2026:10:15:32 +0300] "GET /index.html HTTP/1.1" 200 1234
203.0.113.42 - - [29/Jun/2026:10:15:35 +0300] "GET /admin/login.php HTTP/1.1" 404 512
203.0.113.42 - - [29/Jun/2026:10:15:36 +0300] "GET /wp-admin/ HTTP/1.1" 404 512
203.0.113.42 - - [29/Jun/2026:10:15:37 +0300] "GET /phpmyadmin/ HTTP/1.1" 404 512
203.0.113.42 - - [29/Jun/2026:10:15:38 +0300] "POST /login.php?id=1' OR '1'='1 HTTP/1.1" 500 256
198.51.100.7 - - [29/Jun/2026:10:16:00 +0300] "GET /api/users HTTP/1.1" 200 4096`,
mixed:`Jun 29 10:15:01 server sshd[1234]: Failed password for root from 45.142.122.18 port 51234 ssh2
Jun 29 10:15:03 server sshd[1234]: Failed password for root from 45.142.122.18 port 51235 ssh2
Jun 29 10:15:05 server sshd[1234]: Failed password for admin from 45.142.122.18 port 51236 ssh2
45.142.122.18 - - [29/Jun/2026:10:20:00] "GET /../../etc/passwd HTTP/1.1" 403 256
45.142.122.18 - - [29/Jun/2026:10:20:05] "GET /shell.php?cmd=whoami HTTP/1.1" 404 128
192.168.1.50 - - [29/Jun/2026:10:21:00] "GET /index.html HTTP/1.1" 200 1024`,
};
function loadExample(k){document.getElementById('log-input').value=examples[k];analyzeLog();}

function analyzeLog(){
  const text=document.getElementById('log-input').value;
  if(!text.trim()){document.getElementById('results').innerHTML='';return;}
  const lines=text.split('\n').filter(l=>l.trim());

  const ipRegex=/\b(?:\d{1,3}\.){3}\d{1,3}\b/g;
  const ipCounts={};
  const failedLogins={};
  let sqlInjection=0,pathTraversal=0,shellAttempt=0,xss=0;

  lines.forEach(line=>{
    const ips=line.match(ipRegex)||[];
    ips.forEach(ip=>{ipCounts[ip]=(ipCounts[ip]||0)+1;});

    if(/failed password|authentication failure|invalid user/i.test(line)){
      ips.forEach(ip=>{failedLogins[ip]=(failedLogins[ip]||0)+1;});
    }
    if(/('|%27)\s*(or|and)\s*('|%27)?\s*1\s*=\s*1|union\s+select|drop\s+table|--\s*$/i.test(line))sqlInjection++;
    if(/\.\.\/|\.\.\\|\/etc\/passwd|\/etc\/shadow/i.test(line))pathTraversal++;
    if(/cmd=|exec\(|system\(|shell_exec|\.php\?cmd=/i.test(line))shellAttempt++;
    if(/<script|onerror=|onload=|javascript:/i.test(line))xss++;
  });

  const totalLines=lines.length;
  const uniqueIPs=Object.keys(ipCounts).length;
  const suspiciousIPs=Object.entries(failedLogins).filter(([ip,c])=>c>=3);
  const bruteForce=suspiciousIPs.length>0;

  let html=`<div class="stats-grid">
    <div class="stat"><div class="stat-val">${totalLines}</div><div class="stat-label">Toplam Satir</div></div>
    <div class="stat"><div class="stat-val">${uniqueIPs}</div><div class="stat-label">Unique IP</div></div>
    <div class="stat"><div class="stat-val" style="color:${suspiciousIPs.length?'var(--red)':'var(--green)'}">${suspiciousIPs.length}</div><div class="stat-label">Suphei IP</div></div>
    <div class="stat"><div class="stat-val" style="color:${sqlInjection?'var(--red)':'var(--green)'}">${sqlInjection}</div><div class="stat-label">SQLi Denemesi</div></div>
  </div>`;

  const alerts=[];
  if(bruteForce){
    suspiciousIPs.forEach(([ip,c])=>{
      alerts.push({type:'danger',icon:'🚨',title:`Brute-Force Saldirisi Tespit Edildi: ${ip}`,desc:`Bu IP'den ${c} basarisiz giris denemesi yapildi. Fail2ban veya rate-limiting onerilir.`});
    });
  }
  if(sqlInjection>0)alerts.push({type:'danger',icon:'💉',title:`${sqlInjection} adet SQL Injection denemesi`,desc:'OR 1=1, UNION SELECT gibi pattern\'ler tespit edildi. WAF kurallarini kontrol et.'});
  if(pathTraversal>0)alerts.push({type:'danger',icon:'📁',title:`${pathTraversal} adet Path Traversal denemesi`,desc:'../ veya /etc/passwd erisim girisimi tespit edildi.'});
  if(shellAttempt>0)alerts.push({type:'danger',icon:'💀',title:`${shellAttempt} adet Shell/RCE denemesi`,desc:'cmd= veya shell_exec pattern\'i tespit edildi. Web shell yuklenmis olabilir.'});
  if(xss>0)alerts.push({type:'warn',icon:'⚠️',title:`${xss} adet XSS denemesi`,desc:'Script tag veya event handler injection tespit edildi.'});
  if(alerts.length===0)alerts.push({type:'warn',icon:'✅',title:'Belirgin saldiri pattern\'i tespit edilmedi',desc:'Log temiz gorunuyor, ancak manuel inceleme onerilir.'});

  html+=`<div class="section-label">Tespit Edilen Tehditler</div>`;
  html+=alerts.map(a=>`<div class="alert-box ${a.type==='warn'?'warn':''}"><span class="alert-icon">${a.icon}</span><div><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div></div></div>`).join('');

  const sortedIPs=Object.entries(ipCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(sortedIPs.length>0){
    html+=`<div class="section-label">En Cok Gorulen IP Adresleri</div>
    <div class="ip-table">
      <div class="ip-head"><span>IP Adresi</span><span>Sayim</span><span>Risk</span></div>
      ${sortedIPs.map(([ip,c])=>{
        const failC=failedLogins[ip]||0;
        const risk=failC>=3?'risk-high':failC>0?'risk-med':'risk-low';
        const riskText=failC>=3?'YUKSEK':failC>0?'ORTA':'DUSUK';
        return`<div class="ip-row"><span>${ip}</span><span>${c}</span><span class="${risk}">${riskText}</span></div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
