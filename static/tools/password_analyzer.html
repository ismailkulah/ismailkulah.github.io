<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Password Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 32px 16px; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 22px; color: #00ff88; margin-bottom: 6px; font-family: monospace; }
.subtitle { font-size: 14px; color: #8b949e; margin-bottom: 28px; }
.input-wrap { position: relative; }
input[type=text], input[type=password] { width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 10px; color: #c9d1d9; font-size: 16px; padding: 14px 50px 14px 16px; outline: none; font-family: monospace; transition: border-color 0.2s; }
input:focus { border-color: #00ff88; }
.toggle-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8b949e; font-size: 18px; user-select: none; }
.strength-bar { height: 8px; border-radius: 4px; background: #21262d; margin: 16px 0 8px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s; }
.strength-label { font-size: 13px; font-weight: 500; margin-bottom: 20px; }
.checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.check { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 8px 12px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; }
.check.pass { border-color: rgba(0,255,136,0.3); color: #00ff88; }
.check.fail { border-color: rgba(248,81,73,0.2); color: #8b949e; }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
.stat { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 700; color: #00ff88; font-family: monospace; }
.stat-lab { font-size: 11px; color: #8b949e; margin-top: 4px; }
.crack-time { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
.crack-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
.crack-row:last-child { border: none; }
.crack-type { color: #8b949e; }
.crack-val { font-family: monospace; }
.section-title { font-size: 13px; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: monospace; }
</style>
</head>
<body>
<div class="container">
  <h1>🔑 Password Analyzer</h1>
  <p class="subtitle">Sifrenin gucunu ve kirılma süresini hesapla</p>
  <div class="input-wrap" style="margin-bottom:12px">
    <input type="password" id="pwd" placeholder="Sifreni buraya yaz..." oninput="analyze(this.value)">
    <span class="toggle-eye" onclick="toggleVis()">👁</span>
  </div>
  <div class="strength-bar"><div class="strength-fill" id="sbar" style="width:0%"></div></div>
  <div class="strength-label" id="slabel" style="color:#8b949e">Sifre bekleniyor...</div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-len">0</div><div class="stat-lab">Karakter</div></div>
    <div class="stat"><div class="stat-val" id="s-ent">0</div><div class="stat-lab">Entropy (bit)</div></div>
    <div class="stat"><div class="stat-val" id="s-pool">0</div><div class="stat-lab">Karakter Havuzu</div></div>
  </div>
  <div class="section-title" style="margin-bottom:10px">Kriter Kontrolleri</div>
  <div class="checks" id="checks"></div>
  <div class="section-title" style="margin-top:4px;margin-bottom:10px">Kirılma Süresi (Brute Force)</div>
  <div class="crack-time" id="crack"></div>
</div>
<script>
let visible = false;
function toggleVis() {
  const inp = document.getElementById('pwd');
  visible = !visible;
  inp.type = visible ? 'text' : 'password';
}
const criteria = [
  { id:'len8', label:'En az 8 karakter', test: p => p.length >= 8 },
  { id:'len12', label:'En az 12 karakter', test: p => p.length >= 12 },
  { id:'upper', label:'Buyuk harf (A-Z)', test: p => /[A-Z]/.test(p) },
  { id:'lower', label:'Kucuk harf (a-z)', test: p => /[a-z]/.test(p) },
  { id:'digit', label:'Rakam (0-9)', test: p => /[0-9]/.test(p) },
  { id:'symbol', label:'Ozel karakter (!@#...)', test: p => /[^a-zA-Z0-9]/.test(p) },
  { id:'norepeat', label:'Tekrar yok (aaa)', test: p => !/(.)\1{2}/.test(p) },
  { id:'nosequence', label:'Seri yok (123, abc)', test: p => !/(012|123|234|345|456|567|678|789|abc|bcd|cde|def)/i.test(p) },
];
function formatTime(seconds) {
  if (seconds < 60) return seconds.toFixed(1) + ' saniye';
  if (seconds < 3600) return (seconds/60).toFixed(1) + ' dakika';
  if (seconds < 86400) return (seconds/3600).toFixed(1) + ' saat';
  if (seconds < 31536000) return (seconds/86400).toFixed(1) + ' gun';
  if (seconds < 31536000000) return (seconds/31536000).toFixed(1) + ' yil';
  return (seconds/31536000).toExponential(2) + ' yil';
}
function analyze(p) {
  if (!p) {
    document.getElementById('sbar').style.width = '0%';
    document.getElementById('slabel').textContent = 'Sifre bekleniyor...';
    document.getElementById('slabel').style.color = '#8b949e';
    document.getElementById('s-len').textContent = '0';
    document.getElementById('s-ent').textContent = '0';
    document.getElementById('s-pool').textContent = '0';
    document.getElementById('checks').innerHTML = '';
    document.getElementById('crack').innerHTML = '';
    return;
  }
  let pool = 0;
  if (/[a-z]/.test(p)) pool += 26;
  if (/[A-Z]/.test(p)) pool += 26;
  if (/[0-9]/.test(p)) pool += 10;
  if (/[^a-zA-Z0-9]/.test(p)) pool += 32;
  const entropy = Math.log2(Math.pow(pool || 1, p.length));
  const score = Math.min(100, Math.round(entropy * 1.5));
  const colors = ['#f85149','#d29922','#f0883e','#3fb950','#00ff88'];
  const labels = ['Cok Zayif','Zayif','Orta','Guclu','Cok Guclu'];
  const idx = score < 20 ? 0 : score < 40 ? 1 : score < 60 ? 2 : score < 80 ? 3 : 4;
  document.getElementById('sbar').style.width = score + '%';
  document.getElementById('sbar').style.background = colors[idx];
  document.getElementById('slabel').textContent = labels[idx] + ' — Skor: ' + score + '/100';
  document.getElementById('slabel').style.color = colors[idx];
  document.getElementById('s-len').textContent = p.length;
  document.getElementById('s-ent').textContent = entropy.toFixed(1);
  document.getElementById('s-pool').textContent = pool;
  const checksEl = document.getElementById('checks');
  checksEl.innerHTML = criteria.map(c => {
    const pass = c.test(p);
    return `<div class="check ${pass?'pass':'fail'}">${pass?'✓':'✗'} ${c.label}</div>`;
  }).join('');
  const combinations = Math.pow(pool || 1, p.length);
  const attacks = [
    { name: 'Online (10/s)', speed: 10 },
    { name: 'Offline MD5 (10B/s)', speed: 1e10 },
    { name: 'GPU Cluster (1T/s)', speed: 1e12 },
    { name: 'Nation State (1P/s)', speed: 1e15 },
  ];
  document.getElementById('crack').innerHTML = attacks.map(a => {
    const secs = combinations / a.speed;
    return `<div class="crack-row"><span class="crack-type">${a.name}</span><span class="crack-val" style="color:${secs>31536000?'#3fb950':secs>86400?'#d29922':'#f85149'}">${formatTime(secs)}</span></div>`;
  }).join('');
}
</script>
</body>
</html>
