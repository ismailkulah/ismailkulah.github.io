      url: "https://github.com/ismailkulah"
    - name: linkedin
      url: "https://linkedin.com/in/ismailkulah"
    - name: twitter
      url: "https://twitter.com/ismailkulah"

  profileMode:
    enabled: false

  label:
    text: "🔐 CyberSec Lab"

