  main:
    - identifier: tools
      name: "🛠 Araçlar"
      url: /tools/
      weight: 10
    - identifier: blog
      name: "📝 Blog"
      url: /blog/
      weight: 20
    - identifier: writeups
      name: "🚩 Write-ups"
      url: /writeups/
      weight: 30
    - identifier: about
