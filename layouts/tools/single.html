<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} | CyberSec Lab</title>
{{ partial "head.html" . }}
<style>
.tool-frame-wrapper {
  width: 100%;
  margin: 0;
  padding: 0;
}
.tool-frame-wrapper iframe {
  width: 100%;
  height: 85vh;
  border: none;
  border-radius: 8px;
  display: block;
}
</style>
</head>
<body class="dark">
{{- partial "header.html" . }}
<main class="main">
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-description">{{ .Description }}</p>
  </header>
  <div class="tool-frame-wrapper">
    <iframe src="{{ .Params.tool_url }}" loading="lazy" title="{{ .Title }}"></iframe>
  </div>
</article>
</main>
{{- partial "footer.html" . }}
</body>
</html>
